function pctGrade(pct) {
  if (pct == null) return { label: "No Data", color: "#9ca3af" };
  if (pct >= 80)   return { label: "Elite",    color: "#059669" };
  if (pct >= 60)   return { label: "Strong",   color: "#2563eb" };
  if (pct >= 40)   return { label: "Adequate", color: "#d97706" };
  return               { label: "Concern",  color: "#dc2626" };
}

function ConfidenceSignal({ value }) {
  const bars   = 4;
  const filled = Math.ceil(value * bars);
  const pct    = Math.round(value * 100);
  const col    = value >= 0.8 ? "#059669" : value >= 0.6 ? "#d97706" : "#dc2626";
  return (
    <div style={{ display:"flex", alignItems:"center", gap:6 }}>
      <div style={{ display:"flex", gap:3, alignItems:"flex-end" }}>
        {Array.from({ length: bars }, (_, i) => (
          <div key={i} style={{
            width:4, height: 7 + i*4, borderRadius:1,
            background: i < filled ? col : "#d1d5db",
            opacity:    i < filled ? 1 : 0.5
          }}/>
        ))}
      </div>
      <span style={{ fontSize:12, color:col, fontWeight:600, letterSpacing:0.5 }}>{pct}% conf.</span>
    </div>
  );
}

function AnimBar({ pct, color, animate, delay }) {
  return (
    <div style={{ flex:1, height:8, background:"#e5e7eb", borderRadius:4, overflow:"hidden" }}>
      <div style={{
        height:"100%",
        width: animate ? `${pct ?? 0}%` : "0%",
        background: `linear-gradient(90deg, ${color}88, ${color})`,
        borderRadius:3,
        transition: animate ? `width 1.1s cubic-bezier(0.4,0,0.2,1) ${delay}ms` : "none"
      }}/>
    </div>
  );
}

function MetricRow({ label, sublabel, rawValue, rawLabel, percentile, leagueSit, color, sample, conf, animate, delay, leagueName }) {
  const g = pctGrade(percentile);
  if (percentile == null) return (
    <div style={{ padding:"18px 0", borderBottom:"1px solid #e5e7eb" }}>
      <div style={{ fontSize:13, color:"#374151", letterSpacing:2, textTransform:"uppercase" }}>{label}</div>
      <div style={{ fontSize:14, color:"#9ca3af", marginTop:6 }}>No data for this combination</div>
    </div>
  );
  return (
    <div style={{ padding:"18px 0", borderBottom:"1px solid #e5e7eb" }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:12 }}>
        <div style={{ flex:1, paddingRight:16 }}>
          <div style={{ fontSize:13, color:"#111827", letterSpacing:2, textTransform:"uppercase", fontWeight:700 }}>{label}</div>
          <div style={{ fontSize:13, color:"#374151", letterSpacing:0.3, marginTop:6, lineHeight:1.6 }}>{sublabel}</div>
        </div>
        <div style={{ textAlign:"right", flexShrink:0 }}>
          <div style={{ fontSize:38, fontWeight:900, color:g.color, lineHeight:1, letterSpacing:-1 }}>
            {animate ? `${Math.round(percentile)}` : "0"}<span style={{ fontSize:20, fontWeight:500 }}>th</span>
          </div>
          <div style={{ fontSize:12, color:g.color, opacity:0.8, letterSpacing:2, marginTop:3 }}>PERCENTILE</div>
          <div style={{ fontSize:13, color:"#374151", fontWeight:600, letterSpacing:0.3, marginTop:6 }}>{rawLabel}</div>
          <div style={{ fontSize:12, color:g.color, fontWeight:700, letterSpacing:1.5, marginTop:3 }}>{g.label}</div>
        </div>
      </div>
      <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:10 }}>
        <AnimBar pct={percentile} color={g.color} animate={animate} delay={delay} />
      </div>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
        <div style={{ fontSize:12, color:"#6b7280", letterSpacing:0.5 }}>
          {sample} player situations · vs {leagueSit} in {leagueName}
        </div>
        <ConfidenceSignal value={conf} />
      </div>
    </div>
  );
}

function PlayerDropdown({ player, playerNames, onSelect }) {
  const [query,  setQuery]  = React.useState("");
  const [open,   setOpen]   = React.useState(false);
  const ref = React.useRef(null);

  const filtered = playerNames.filter(n => n.toLowerCase().includes(query.toLowerCase()));

  React.useEffect(() => {
    function handleClick(e) {
      if (ref.current && !ref.current.contains(e.target)) setOpen(false);
    }
    document.addEventListener("mousedown", handleClick);
    return () => document.removeEventListener("mousedown", handleClick);
  }, []);

  return (
    <div ref={ref} style={{ position:"relative", width:"100%" }}>
      <div style={{ display:"flex", alignItems:"center", gap:8,
        border:"1px solid #d1d5db", borderRadius:3, padding:"9px 14px",
        background:"#ffffff", cursor:"text" }}
        onClick={() => setOpen(true)}>
        <span style={{ fontSize:15, color:"#111827", fontWeight:500, letterSpacing:0.3, flex:1,
          whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>
          {player || "Select player…"}
        </span>
        <span style={{ fontSize:13, color:"#9ca3af" }}>▾</span>
      </div>
      {open && (
        <div style={{
          position:"absolute", top:"100%", left:0, right:0, zIndex:99,
          background:"#ffffff", border:"1px solid #d1d5db", borderRadius:3,
          marginTop:3, maxHeight:260, display:"flex", flexDirection:"column",
          boxShadow:"0 4px 12px rgba(0,0,0,0.10)"
        }}>
          <input
            autoFocus
            value={query}
            onChange={e => setQuery(e.target.value)}
            placeholder="Search player…"
            style={{
              padding:"9px 14px", background:"#f9fafb", border:"none",
              borderBottom:"1px solid #e5e7eb", color:"#111827", fontSize:14,
              letterSpacing:0.5, outline:"none"
            }}
          />
          <div style={{ overflowY:"auto", flex:1 }}>
            {filtered.length === 0
              ? <div style={{ padding:"12px 14px", fontSize:14, color:"#9ca3af" }}>No players found</div>
              : filtered.map(n => (
                <div key={n}
                  onClick={() => { onSelect(n); setOpen(false); setQuery(""); }}
                  style={{
                    padding:"11px 14px", fontSize:14, color: n===player ? "#111827" : "#374151",
                    background: n===player ? "#f3f4f6" : "transparent",
                    letterSpacing:0.5, cursor:"pointer",
                    borderBottom:"1px solid #f3f4f6"
                  }}
                  onMouseEnter={e => e.currentTarget.style.background="#f9fafb"}
                  onMouseLeave={e => e.currentTarget.style.background = n===player ? "#f3f4f6" : "transparent"}
                >
                  {n}
                </div>
              ))
            }
          </div>
        </div>
      )}
    </div>
  );
}

function MiniBar({ pct, color }) {
  const g = pctGrade(pct);
  const c = pct == null ? "#d1d5db" : g.color;
  return (
    <div style={{ display:"flex", alignItems:"center", gap:6, width:96 }}>
      <div style={{ flex:1, height:6, background:"#eef0f3", borderRadius:3, overflow:"hidden" }}>
        <div style={{ height:"100%", width:`${pct ?? 0}%`,
          background: `linear-gradient(90deg, ${c}88, ${c})`,
          borderRadius:3, transition:"width 0.6s ease" }}/>
      </div>
      <span style={{ fontSize:11, fontWeight:700, color: pct == null ? "#9ca3af" : c,
        width:22, textAlign:"right", fontVariantNumeric:"tabular-nums" }}>
        {pct == null ? "—" : Math.round(pct)}
      </span>
    </div>
  );
}

  const rows = Object.entries(PLAYERS)
    .map(([name, p]) => {
      const m = (p.leagues || {})[league] || {};
      return {
        name,
        source: p.source_league || "",
        score:  m.fit_score ?? null,
        rec:    m.rec_pct ?? null,
        xg:     m.xg_pct  ?? null,
        aer:    m.aer_pct ?? null,
        rec_n:  m.rec_n ?? 0,
        xg_n:   m.xg_n  ?? 0,
        aer_n:  m.aer_n ?? 0,
      };
    })
    .filter(r => sourceFilter === "All" || r.source === sourceFilter)
    .sort((a, b) => {
      if (a.score == null && b.score == null) return a.name.localeCompare(b.name);
      if (a.score == null) return 1;
      if (b.score == null) return -1;
      return b.score - a.score;
    });

  return (
    <div>
      {/* Source filter */}
      <div style={{ padding:"14px 28px", borderBottom:"1px solid #e5e7eb",
        display:"flex", gap:8, alignItems:"center", flexWrap:"wrap" }}>
        <span style={{ fontSize:11, color:"#6b7280", letterSpacing:2,
          textTransform:"uppercase", fontWeight:700, marginRight:4 }}>Source League</span>
        {["All", ...sourceLeagues].map(s => (
          <button key={s} onClick={() => setSourceFilter(s)} style={{
            fontSize:12, letterSpacing:1, textTransform:"uppercase", fontWeight:700,
            padding:"6px 12px", borderRadius:4,
            color:      sourceFilter === s ? "#111827" : "#6b7280",
            background: sourceFilter === s ? "#eef2ff" : "#f3f4f6",
            border:    `1px solid ${sourceFilter === s ? "#a5b4fc" : "#e5e7eb"}`
          }}>{s}</button>
        ))}
        <span style={{ marginLeft:"auto", fontSize:12, color:"#6b7280", letterSpacing:0.5 }}>
          {rows.length} players · ranked vs {league}
        </span>
      </div>

      {/* Column headers */}
      <div style={{ display:"flex", alignItems:"center", padding:"10px 28px",
        background:"#f9fafb", borderBottom:"1px solid #e5e7eb",
        fontSize:11, color:"#6b7280", letterSpacing:2, textTransform:"uppercase", fontWeight:700 }}>
        <div style={{ width:36 }}>#</div>
        <div style={{ flex:1 }}>Player · Source</div>
        <div style={{ width:96, textAlign:"left" }}>Reception</div>
        <div style={{ width:96, textAlign:"left", marginLeft:14 }}>Conversion</div>
        <div style={{ width:96, textAlign:"left", marginLeft:14 }}>Aerial</div>
        <div style={{ width:88, textAlign:"right", marginLeft:18 }}>Score</div>
      </div>

      {/* Rows */}
      <div style={{ maxHeight:560, overflowY:"auto" }}>
        {rows.map((r, i) => {
          const g = pctGrade(r.score);
          const isTop3 = i < 3 && r.score != null;
          const medalColor = i === 0 ? "#d4af37" : i === 1 ? "#9ca3af" : i === 2 ? "#cd7f32" : "#9ca3af";
          return (
            <div key={r.name} onClick={() => onPick(r.name)}
              style={{ display:"flex", alignItems:"center", padding:"14px 28px",
                borderBottom:"1px solid #f3f4f6", cursor:"pointer",
                background: isTop3 ? `${medalColor}10` : "transparent",
                transition:"background 0.15s ease" }}
              onMouseEnter={e => e.currentTarget.style.background = "#f9fafb"}
              onMouseLeave={e => e.currentTarget.style.background = isTop3 ? `${medalColor}10` : "transparent"}
            >
              <div style={{ width:36, fontSize:isTop3 ? 18 : 14, fontWeight:isTop3 ? 800 : 600,
                color: isTop3 ? medalColor : "#9ca3af", fontVariantNumeric:"tabular-nums" }}>
                {i+1}
              </div>
              <div style={{ flex:1, paddingRight:12, minWidth:0 }}>
                <div style={{ fontSize:14, fontWeight:700, color:"#111827", letterSpacing:0.3,
                  whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>
                  {r.name}
                </div>
                <div style={{ fontSize:11, color:"#6b7280", letterSpacing:0.5, marginTop:2 }}>
                  {r.source}
                </div>
              </div>
              <MiniBar pct={r.rec} />
              <div style={{ marginLeft:14 }}><MiniBar pct={r.xg} /></div>
              <div style={{ marginLeft:14 }}><MiniBar pct={r.aer} /></div>
              <div style={{ width:88, marginLeft:18, textAlign:"right" }}>
                <div style={{ fontSize:24, fontWeight:900, color: g.color, lineHeight:1,
                  fontVariantNumeric:"tabular-nums", letterSpacing:-0.5 }}>
                  {r.score == null ? "—" : r.score}
                </div>
                <div style={{ fontSize:10, color: g.color, opacity:0.85, letterSpacing:1.5,
                  textTransform:"uppercase", fontWeight:700, marginTop:3 }}>
                  {g.label}
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function App() {
  const playerNames = Object.keys(PLAYERS);
  const sourceLeagues = Array.from(new Set(playerNames.map(n => PLAYERS[n].source_league).filter(Boolean))).sort();

  const [view,   setView]   = React.useState("list"); // "card" | "list"
  const [player, setPlayer] = React.useState(playerNames[0] || "");
  const [league, setLeague] = React.useState(LEAGUES[0]     || "");
  const [sourceFilter, setSourceFilter] = React.useState("All");
  const [animate, setAnimate] = React.useState(false);
  const [opacity, setOpacity] = React.useState(1);

  React.useEffect(() => { setTimeout(() => setAnimate(true), 500); }, []);

  const trigger = (fn) => {
    setAnimate(false); setOpacity(0);
    setTimeout(() => { fn(); setOpacity(1); setTimeout(() => setAnimate(true), 60); }, 260);
  };

  const pickPlayer = (name) => {
    trigger(() => { setPlayer(name); setView("card"); });
  };

  const profile = PLAYERS[player] || {};
  const m       = (profile.leagues || {})[league] || {};
  const lc      = COLORS[league]   || "#aaa";
  const bm      = BENCHMARKS[league] || {};

  const fitScore = m.fit_score ?? null;
  const fitColor = fitScore == null ? "#9ca3af"
    : fitScore >= 75 ? "#059669"
    : fitScore >= 60 ? "#2563eb"
    : fitScore >= 40 ? "#d97706"
    : "#dc2626";
  const fitLabel = fitScore == null ? "No Data"
    : fitScore >= 75 ? "Top Quartile Fit"
    : fitScore >= 60 ? "Above Average Fit"
    : fitScore >= 40 ? "Below Average Fit"
    : "Bottom Quartile";

  return (
    <div style={{ minHeight:"100vh", background:"#f0f2f5",
      display:"flex", alignItems:"center", justifyContent:"center",
      fontFamily:"'Segoe UI', sans-serif", padding:32 }}>
      <div style={{
        width: view === "list" ? 980 : 760,
        background:"#ffffff",
        border:"1px solid #e5e7eb", borderRadius:8, overflow:"hidden",
        boxShadow:"0 4px 24px rgba(0,0,0,0.08)",
        transition:"width 0.3s ease"
      }}>

        {/* HEADER */}
        <div style={{ padding:"16px 28px", borderBottom:"1px solid #e5e7eb",
          display:"flex", justifyContent:"space-between", alignItems:"center",
          background:"#f9fafb" }}>
          <span style={{ fontSize:13, letterSpacing:4, color:"#374151", textTransform:"uppercase", fontWeight:700 }}>
            StatsBomb · Transfer Fit Index
          </span>
          <span style={{ fontSize:12, color:"#6b7280", letterSpacing:3, textTransform:"uppercase", fontWeight:500 }}>
            Centre Forwards
          </span>
        </div>

        {/* VIEW TABS */}
        <div style={{ display:"flex", borderBottom:"1px solid #e5e7eb", background:"#ffffff" }}>
          {[["list","Leaderboard"],["card","Player Card"]].map(([v,label]) => (
            <button key={v} onClick={() => trigger(() => setView(v))} style={{
              flex:1, padding:"12px 16px",
              fontSize:12, letterSpacing:2.5, textTransform:"uppercase", fontWeight:700,
              color:      view === v ? "#111827" : "#9ca3af",
              background: view === v ? "#ffffff" : "#f9fafb",
              border:"none",
              borderBottom: view === v ? "2px solid #111827" : "2px solid transparent",
              cursor:"pointer", transition:"all 0.15s ease"
            }}>{label}</button>
          ))}
        </div>

        {/* PLAYER DROPDOWN — only in card view */}
        {view === "card" && (
          <div style={{ padding:"14px 28px", borderBottom:"1px solid #e5e7eb" }}>
            <PlayerDropdown
              player={player}
              playerNames={playerNames}
              onSelect={n => trigger(() => setPlayer(n))}
            />
          </div>
        )}

        {/* LEAGUE SELECTOR */}
        <div style={{ padding:"14px 28px", borderBottom:"1px solid #e5e7eb",
          display:"flex", gap:8, flexWrap:"wrap", alignItems:"center" }}>
          <span style={{ fontSize:11, color:"#6b7280", letterSpacing:2,
            textTransform:"uppercase", fontWeight:700, marginRight:4 }}>Target</span>
          {LEAGUES.map(l => (
            <button key={l} onClick={() => trigger(() => setLeague(l))} style={{
              fontSize:13, letterSpacing:1.5, textTransform:"uppercase", fontWeight:700,
              padding:"7px 16px", borderRadius:4,
              color:      league===l ? COLORS[l]          : "#6b7280",
              background: league===l ? `${COLORS[l]}18` : "#f3f4f6",
              border:    `1px solid ${league===l ? COLORS[l]+"66" : "#e5e7eb"}`,
              cursor:"pointer"
            }}>{l}</button>
          ))}
        </div>

        <div style={{ opacity, transition:"opacity 0.26s ease" }}>

        {view === "list" && (
          <Leaderboard
            league={league}
            sourceFilter={sourceFilter}
            setSourceFilter={setSourceFilter}
            sourceLeagues={sourceLeagues}
            onPick={pickPlayer}
          />
        )}

        {view === "card" && (
          <React.Fragment>

          {/* IDENTITY + DIFFICULTY SCORE */}
          <div style={{ padding:"26px 28px 22px", borderBottom:"1px solid #e5e7eb",
            display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
            <div>
              <div style={{ fontSize:28, fontWeight:800, letterSpacing:2, color:"#111827", lineHeight:1.1 }}>
                {player.toUpperCase()}
              </div>
              <div style={{ fontSize:15, color:"#374151", fontWeight:500, letterSpacing:0.5, marginTop:8 }}>
                {profile.source_league || ""}
              </div>
              <div style={{ marginTop:14, display:"flex", alignItems:"center", gap:8 }}>
                <div style={{ fontSize:13, letterSpacing:2, color:lc, fontWeight:700,
                  padding:"6px 16px", border:`1px solid ${lc}55`, borderRadius:4,
                  background:`${lc}0d` }}>
                  → {league.toUpperCase()}
                </div>
              </div>
            </div>
            <div style={{ textAlign:"center" }}>
              <div style={{ fontSize:64, fontWeight:900, color:fitColor, lineHeight:1, letterSpacing:-2 }}>
                {animate && fitScore != null ? fitScore : fitScore == null ? "–" : 0}
              </div>
              <div style={{ fontSize:12, color:fitColor, opacity:0.75, letterSpacing:3, marginTop:8 }}>
                DIFFICULTY SCORE
              </div>
              <div style={{ fontSize:15, color:fitColor, letterSpacing:0.5, marginTop:6, fontWeight:700 }}>
                {fitLabel}
              </div>
            </div>
          </div>

          {/* CONTEXT NOTE */}
          <div style={{ padding:"12px 28px 0" }}>
            <div style={{ fontSize:13, color:"#6b7280", fontWeight:500, letterSpacing:2, textTransform:"uppercase" }}>
              Ranked vs {league} strikers · matched difficulty only
            </div>
          </div>

          {/* METRICS */}
          <div style={{ padding:"0 28px" }}>
            <MetricRow
              label="Reception Under Pressure"
              sublabel={`2nd-nearest defender ≤ ${bm.threshold_dist2 != null ? bm.threshold_dist2.toFixed(1) : "–"}m (crowded) · next action success rate`}
              rawValue={m.rec_rate}
              rawLabel={m.rec_rate != null ? `${Math.round(m.rec_rate*100)}% success` : "–"}
              percentile={m.rec_pct ?? null}
              leagueSit={m.rec_league_sit ?? 0}
              leagueName={league}
              color={lc}
              sample={m.rec_n ?? 0}
              conf={m.rec_conf ?? 0}
              animate={animate}
              delay={0}
            />
            <MetricRow
              label="Finishing on Hard Chances"
              sublabel={`Open-play shots · xG ≤ ${bm.threshold_xg != null ? bm.threshold_xg.toFixed(3) : "–"} · goals − total xG`}
              rawValue={m.xg_diff_total}
              rawLabel={m.xg_diff_total != null
                ? `${m.xg_diff_total >= 0 ? "+" : ""}${m.xg_diff_total.toFixed(2)} goals vs xG`
                : "–"}
              percentile={m.xg_pct ?? null}
              leagueSit={m.xg_league_sit ?? 0}
              leagueName={league}
              color={lc}
              sample={m.xg_n ?? 0}
              conf={m.xg_conf ?? 0}
              animate={animate}
              delay={120}
            />
            <MetricRow
              label="Aerial Duels vs Elite Defenders"
              sublabel={`Opponent HOPS ≥ ${bm.threshold_hops != null ? bm.threshold_hops.toFixed(3) : "–"} · win rate`}
              rawValue={m.aer_rate}
              rawLabel={m.aer_rate != null ? `${Math.round(m.aer_rate*100)}% win rate` : "–"}
              percentile={m.aer_pct ?? null}
              leagueSit={m.aer_league_sit ?? 0}
              leagueName={league}
              color={lc}
              sample={m.aer_n ?? 0}
              conf={m.aer_conf ?? 0}
              animate={animate}
              delay={240}
            />
          </div>

          {/* METHOD NOTE */}
          <div style={{ margin:"0 28px 20px", padding:"12px 16px",
            background:"#f9fafb", border:"1px solid #e5e7eb", borderRadius:6 }}>
            <div style={{ fontSize:13, color:"#6b7280", letterSpacing:0.3, lineHeight:2 }}>
              Difficulty thresholds = MEDIANS of the target league: receipts in crowded
              situations (2nd-nearest defender ≤ league median), open-play shots ≤ median
              xG, aerials vs opponents with HOPS ≥ median. Finishing is measured as
              absolute (goals − total xG) on those hard shots — positive = clinical,
              negative = wasteful. Minimum sample size per metric is set per target league
              as max(floor, p10 of that league's player-count distribution). Above the
              minimum, the raw percentile is used at face value (no shrinkage). Equal
              priors (1/3 each) are redistributed over qualifying metrics; insufficient
              metrics are excluded — not zeroed. Score is descriptive, not predictive.
            </div>
          </div>

          {/* FOOTER */}
          <div style={{ borderTop:"1px solid #e5e7eb", padding:"12px 28px",
            background:"#f9fafb", display:"flex", justifyContent:"space-between" }}>
            <span style={{ fontSize:12, color:"#9ca3af", letterSpacing:3, textTransform:"uppercase" }}>
              Descriptive · Not Predictive
            </span>
            <span style={{ fontSize:12, color:"#9ca3af", letterSpacing:2 }}>© StatsBomb</span>
          </div>
          </React.Fragment>
        )}

        {/* SHARED FOOTER (list view) */}
        {view === "list" && (
          <div style={{ borderTop:"1px solid #e5e7eb", padding:"12px 28px",
            background:"#f9fafb", display:"flex", justifyContent:"space-between" }}>
            <span style={{ fontSize:12, color:"#9ca3af", letterSpacing:3, textTransform:"uppercase" }}>
              Click any row to open the player card
            </span>
            <span style={{ fontSize:12, color:"#9ca3af", letterSpacing:2 }}>© StatsBomb</span>
          </div>
        )}

        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
